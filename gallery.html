  <style>
    #gallery-hero {
      min-height: 52vh;
      display: flex;
      align-items: flex-end;
      padding-top: calc(var(--nav-h) + 3rem);
      padding-bottom: 4rem;
      background: linear-gradient(160deg, #EDE4DC 0%, #F8F5F1 100%);
    }

    /* Lightbox */
    .lightbox {
      display: none;
      position: fixed; inset: 0; z-index: 999;
      background: rgba(0,0,0,0.88);
      align-items: center; justify-content: center;
    }
    .lightbox.open { display: flex; }
    .lightbox img {
      max-width: 90vw;
      max-height: 90vh;
      border-radius: 8px;
      object-fit: contain;
    }
    .lightbox-close {
      position: absolute; top: 1.5rem; right: 1.5rem;
      color: white; font-size: 1.75rem;
      cursor: pointer; line-height: 1;
      background: none; border: none;
      opacity: 0.7; transition: opacity 0.2s;
    }
    .lightbox-close:hover { opacity: 1; }

    .gallery-section { padding: 80px 0; }
    .gallery-intro { margin-bottom: 3rem; max-width: 540px; }

    /* How-to note (visible until real photos are added) */
    .gallery-note {
      padding: 1.25rem 1.5rem;
      background: var(--accent-light);
      border-left: 3px solid var(--accent);
      border-radius: 0 8px 8px 0;
      font-size: 0.83rem;
      color: var(--text-muted);
      margin-bottom: 2.5rem;
      line-height: 1.7;
    }
    .gallery-note strong { color: var(--accent); }
  </style>
</head>

<script src="js/main.js"></script>
<script>
  // Lightbox for real photos (placeholders are skipped)
  const lightbox = document.getElementById('lightbox');
  const lightboxImg = document.getElementById('lightboxImg');
  document.querySelectorAll('.gallery-item img').forEach(img => {
    img.style.cursor = 'pointer';
    img.addEventListener('click', () => {
      lightboxImg.src = img.src;
      lightboxImg.alt = img.alt;
      lightbox.classList.add('open');
    });
  });
  document.getElementById('lightboxClose').addEventListener('click', () => lightbox.classList.remove('open'));
  lightbox.addEventListener('click', e => { if (e.target === lightbox) lightbox.classList.remove('open'); });
  document.addEventListener('keydown', e => { if (e.key === 'Escape') lightbox.classList.remove('open'); });
</script>
